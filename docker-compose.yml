services:
  # The PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: complaints_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: complaints_db
    ports:
      # Map host port 5432 to container port 5432
      - "5432:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d complaints_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Node.js Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: complaints_api
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      # Map the port from your .env file (e.g., 5000) to the container's port 5000
      - "${PORT:-5000}:5000"
    environment:
      # Override the DATABASE_URL to point to the docker service 'db'
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/complaints_db"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data: